name: milemaid
description: "MileMaid - Automatic mileage tracking and professional reports. Cheaper alternative to MileIQ with powerful background tracking."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Maps
  google_maps_flutter: ^2.9.0

  # Location & Background Tracking (critical stack)
  geolocator: ^13.0.2
  flutter_foreground_task: ^6.1.0
  # workmanager disabled in v1 due to plugin compatibility with current Flutter; foreground_task is primary

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State management
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Codegen models
  freezed: ^2.4.7
  freezed_annotation: ^2.4.4

  # Navigation
  go_router: ^14.6.2

  # Charts & Reports
  fl_chart: ^0.70.0
  pdf: ^3.11.1
  printing: ^5.13.4

  # Utils
  intl: ^0.19.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  share_plus: ^10.0.0
  uuid: ^4.5.1
  equatable: ^2.0.5
  json_annotation: ^4.9.0

  # Notifications
  flutter_local_notifications: ^18.0.1

  # Monetization (in-app subscriptions for Pro/Premium)
  in_app_purchase: ^3.2.0

  # Premium animations
  rive: ^0.13.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  # Assets for future illustrations / icons
  assets:
    - assets/images/
    - assets/rive/
